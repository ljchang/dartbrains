<svg width="680" height="345" viewBox="0 0 680 345" xmlns="http://www.w3.org/2000/svg" style="background:white">
<style>
  text { font-family: Helvetica, Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
  .ts { font-size: 12px; fill: #5F5E5A; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- Row labels -->
<text class="th" x="40" y="52" text-anchor="end">RF</text>
<text class="th" x="40" y="132" text-anchor="end">Signal</text>
<text class="th" x="40" y="202" text-anchor="end">Gss</text>
<text class="th" x="40" y="258" text-anchor="end">Gpe</text>
<text class="th" x="40" y="314" text-anchor="end">Gro</text>

<!-- Baselines -->
<line x1="55" y1="52" x2="640" y2="52" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<line x1="55" y1="132" x2="640" y2="132" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<line x1="55" y1="202" x2="640" y2="202" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<line x1="55" y1="258" x2="640" y2="258" stroke="#888780" stroke-width="0.5" opacity="0.4"/>
<line x1="55" y1="314" x2="640" y2="314" stroke="#888780" stroke-width="0.5" opacity="0.4"/>

<!-- α RF pulse -->
<rect x="140" y="28" width="16" height="24" rx="2" fill="#7F77DD" opacity="0.85"/>
<text class="ts" x="148" y="22" text-anchor="middle" fill="#534AB7">α</text>

<!-- FID / dephasing signal -->
<path d="M158 132 Q170 100,180 114 Q188 126,196 129 Q208 131,230 131.5 Q260 132,310 132" fill="none" stroke="#1D9E75" stroke-width="1.5" opacity="0.5"/>

<!-- Gradient echo -->
<path d="M380 132 Q400 131,420 130 Q435 128,445 122 Q455 108,460 94 Q465 108,470 122 Q480 128,490 130 Q510 131.5,540 132" fill="none" stroke="#1D9E75" stroke-width="2"/>

<!-- Slice select gradient -->
<rect x="128" y="180" width="36" height="22" rx="2" fill="#378ADD" opacity="0.5"/>
<rect x="164" y="202" width="18" height="14" rx="2" fill="#378ADD" opacity="0.35"/>

<!-- Phase encode gradient -->
<rect x="190" y="238" width="30" height="20" rx="2" fill="#EF9F27" opacity="0.5"/>
<line x1="195" y1="242" x2="215" y2="242" stroke="#EF9F27" stroke-width="0.5" opacity="0.4" stroke-dasharray="2 2"/>
<line x1="195" y1="248" x2="215" y2="248" stroke="#EF9F27" stroke-width="0.5" opacity="0.4" stroke-dasharray="2 2"/>
<line x1="195" y1="254" x2="215" y2="254" stroke="#EF9F27" stroke-width="0.5" opacity="0.4" stroke-dasharray="2 2"/>

<!-- Readout dephasing lobe -->
<rect x="190" y="314" width="36" height="16" rx="2" fill="#1D9E75" opacity="0.35"/>
<text class="ts" x="208" y="342" text-anchor="middle" fill="#0F6E56" opacity="0.6">−</text>

<!-- Readout gradient -->
<rect x="410" y="290" width="100" height="24" rx="2" fill="#1D9E75" opacity="0.5"/>
<text class="ts" x="460" y="286" text-anchor="middle" fill="#0F6E56" opacity="0.6">+</text>

<!-- TE bracket -->
<line x1="148" y1="148" x2="148" y2="158" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="460" y1="148" x2="460" y2="158" stroke="#5F5E5A" stroke-width="0.5"/>
<line x1="148" y1="153" x2="460" y2="153" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="304" y="168" text-anchor="middle">TE</text>

<!-- Echo label -->
<text class="ts" x="460" y="82" text-anchor="middle" fill="#0F6E56">Gradient echo</text>
<line x1="460" y1="86" x2="460" y2="130" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- TR bracket -->
<line x1="148" y1="336" x2="148" y2="344" stroke="#E24B4A" stroke-width="0.5"/>
<line x1="588" y1="336" x2="588" y2="344" stroke="#E24B4A" stroke-width="0.5"/>
<line x1="148" y1="340" x2="588" y2="340" stroke="#E24B4A" stroke-width="0.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="368" y="337" text-anchor="middle" fill="#A32D2D">TR</text>

<!-- Next α pulse (faded) -->
<rect x="578" y="28" width="16" height="24" rx="2" fill="#7F77DD" opacity="0.35"/>
<text class="ts" x="586" y="22" text-anchor="middle" fill="#534AB7" opacity="0.5">α</text>
</svg>
