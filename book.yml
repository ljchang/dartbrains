repo: https://github.com/ljchang/dartbrains
branch: v2-marimo-migration

logo: images/logo/dartbrains_logo_square_transparent.png
favicon: images/logo/favicon.ico
logo_placement: sidebar

theme:
  palette:
    primary: "#00693E"   # Dartmouth green
    accent:  "#A5D75F"
  font:
    text: Source Sans Pro
    code: JetBrains Mono

launch_buttons:
  molab: true
  github: true
  download: true

# Google Analytics — GA4 Measurement ID for dartbrains.org.
# (The legacy UA-138270939-1 Universal Analytics property was retired
# by Google on 2023-07-01; this is its GA4 successor.)
analytics:
  provider: google
  property: G-MQK18K92KD

# Static reactivity for discrete mo.ui widgets (slider/dropdown/etc).
# Each widget's downstream cells are re-rendered per value at build time
# and cached as a JSON lookup table; a tiny JS shim swaps the visible
# output as the reader moves the slider. No browser kernel needed.
#
# Heavy chapters (whole-brain decomposition + per-component nilearn
# rendering) trip the default caps and silently render static (no
# slider). Empirically:
#   - ICA: ~10 renders × ~15 s = ~150 s
#   - Connectivity: ~41 renders × ~16 s = ~677 s
# Bump both wall-clock and bytes caps so these chapters can precompute.
precompute:
  enabled: true
  max_seconds_per_page: 1200        # 20 minutes
  max_bytes_per_page: 50000000      # 50 MB

# Per-widget-class default state — each anywidget's JS sees a sensible
# value when it calls model.get("key") on initial render in the static
# build (no kernel running to update state from cell-level kwargs).
widget_defaults:
  CompassWidget:
    b0: 3.0
  NetMagnetizationWidget:
    n_protons: 100
    b0_on: false
  PrecessionWidget:
    b0: 3.0
    flip_angle: 90.0
    t1: 0.0
    t2: 0.0
    show_relaxation: false
    paused: false
  SpinEnsembleWidget:
    sequence_type: spin_echo
    speed: 1.0
  KSpaceWidget:
    mask_type: full
    radius_fraction: 1.0
    speed: 1.0
  EncodingWidget:
    speed: 1.0
  ConvolutionWidget:
    pattern: block
    speed: 1.0
  TransformCubeWidget:
    tx: 0
    ty: 0
    tz: 0
    rot_x: 0
    rot_y: 0
    rot_z: 0
    scale_x: 1.0
    scale_y: 1.0
    scale_z: 1.0
  CostFunctionWidget:
    trans_x: 0
    trans_y: 0
  SmoothingWidget:
    fwhm: 0

