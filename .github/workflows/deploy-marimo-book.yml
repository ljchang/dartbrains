name: deploy-marimo-book

on:
  push:
    branches:
      - v2-marimo-migration
  workflow_dispatch:

# Required for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Validate book.yml
        run: uv run marimo-book check

      - name: Build the book
        run: uv run marimo-book build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
