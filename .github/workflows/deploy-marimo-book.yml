name: deploy-marimo-book

on:
  push:
    branches:
      - master
      - v2-marimo-migration
  workflow_dispatch:

# Required for actions/deploy-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, cancel in-progress ones
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # GitHub-hosted ubuntu-latest runners ship with ~14 GB free, which
      # the heavy chapters (ICA: ~150s × big lookup table, MR_Physics: 30+
      # WASM widgets, Preprocessing: 12 widgets + brain SVG QC reports)
      # eat into via uv's sync cache + matplotlib intermediates. The
      # `Build the book` step has been crashing with `No space left on
      # device`. This step removes ~30 GB of preinstalled tooling we
      # don't use (Android SDK, .NET, GHC, browsers, large hostedtoolcache
      # entries) before any of our work runs. AWS-cli stays — we don't
      # use it but stripping it costs <100 MB and saves the maintenance
      # burden of inspecting every removed package.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /opt/hostedtoolcache/PyPy || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /opt/microsoft || true
          df -h /

      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      # Restore the marimo-book build cache so unchanged chapters skip
      # re-rendering. The cache is keyed on content/, book.yml, and
      # uv.lock — any of those changing cuts a fresh cache. restore-keys
      # falls back to the most recent partial-match cache so even fresh
      # keys start warm; BuildCache then validates each entry against
      # current source hashes and re-renders only what's drifted.
      #
      # First build after this step lands pays full cold-build cost;
      # subsequent unmodified-content builds drop to ~1-2 min.
      # Heaviest chapters (ICA, Connectivity) are the big wins — their
      # cold renders are 2-12 minutes each.
      - name: Restore marimo-book build cache
        uses: actions/cache@v4
        with:
          path: .marimo_book_cache
          key: mb-${{ runner.os }}-${{ hashFiles('content/**', 'book.yml', 'uv.lock') }}
          restore-keys: |
            mb-${{ runner.os }}-

      - name: Validate book.yml
        run: uv run marimo-book check

      - name: Build the book
        run: uv run marimo-book build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
