name: deploy-book

# Legacy JB2 + peaceiris -> gh-pages branch deploy. Kept as a rewind
# safety net during the marimo-book cutover. Push triggers removed so it
# only runs on manual workflow_dispatch. Restore the legacy site by:
#   1. workflow_dispatch this workflow on master
#   2. Settings -> Pages -> Source: change to "Deploy from a branch"
#      (gh-pages, /)
on:
  workflow_dispatch:

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Export marimo notebooks to ipynb
        run: uv run python scripts/export_notebooks.py

      - name: Build the book
        run: uv run jupyter book build --site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
          cname: dartbrains.org
